<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Login</title><style>
    *{box-sizing:border-box;margin:0;padding:0} html{scroll-behavior:smooth} body{font-family:Inter,Arial,sans-serif;color:#172033;background:#f7f9ff;line-height:1.6} a{text-decoration:none;color:inherit} .wrap{width:min(1180px,92%);margin:auto}.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid #e8ecf5}.nav-in{height:74px;display:flex;align-items:center;justify-content:space-between}.brand{font-weight:900;font-size:24px;color:#2563eb}.links{display:flex;gap:24px;align-items:center;font-weight:700;color:#3f4a62}.links a:hover{color:#2563eb}.admin{padding:10px 18px;border-radius:999px;background:#111827;color:#fff}.hero{padding:70px 0 50px;overflow:hidden}.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:44px;align-items:center}.pill{display:inline-flex;gap:8px;align-items:center;background:#eaf1ff;color:#1d4ed8;border:1px solid #cfe0ff;padding:9px 15px;border-radius:999px;font-weight:800;margin-bottom:18px}.hero h1{font-size:clamp(46px,7vw,88px);line-height:.95;letter-spacing:-3px;margin-bottom:20px}.grad{background:linear-gradient(135deg,#2563eb,#9333ea,#f97316);-webkit-background-clip:text;color:transparent}.hero p{font-size:20px;color:#5b667a;max-width:680px;margin-bottom:26px}.btns{display:flex;gap:14px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:15px 22px;font-weight:900;cursor:pointer;box-shadow:0 14px 32px rgba(37,99,235,.18)}.primary{background:#2563eb;color:white}.secondary{background:white;color:#172033;border:1px solid #dfe6f3}.chips{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.chip{background:white;border:1px solid #e6ebf5;border-radius:999px;padding:10px 14px;font-weight:800;color:#445169}.phone{position:relative;background:linear-gradient(160deg,#ffffff,#eef4ff);border:1px solid #dfe7f7;border-radius:34px;padding:24px;box-shadow:0 30px 80px rgba(31,41,55,.18)}.float{position:absolute;background:#fff;border:1px solid #e7ecf6;border-radius:18px;padding:1
