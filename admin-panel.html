<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin Panel</title><style>
    *{box-sizing:border-box;margin:0;padding:0} html{scroll-behavior:smooth} body{font-family:Inter,Arial,sans-serif;color:#172033;background:#f7f9ff;line-height:1.6} a{text-decoration:none;color:inherit} .wrap{width:min(1180px,92%);margin:auto}.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(14px);border-bottom:1px solid #e8ecf5}.nav-in{height:74px;display:flex;align-items:center;justify-content:space-between}.brand{font-weight:900;font-size:24px;color:#2563eb}.links{display:flex;gap:24px;align-items:center;font-weight:700;color:#3f4a62}.links a:hover{color:#2563eb}.admin{padding:10px 18px;border-radius:999px;background:#111827;color:#fff}.hero{padding:70px 0 50px;overflow:hidden}.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:44px;align-items:center}.pill{display:inline-flex;gap:8px;align-items:center;background:#eaf1ff;color:#1d4ed8;border:1px solid #cfe0ff;padding:9px 15px;border-radius:999px;font-weight:800;margin-bottom:18px}.hero h1{font-size:clamp(46px,7vw,88px);line-height:.95;letter-spacing:-3px;margin-bottom:20px}.grad{background:linear-gradient(135deg,#2563eb,#9333ea,#f97316);-webkit-background-clip:text;color:transparent}.hero p{font-size:20px;color:#5b667a;max-width:680px;margin-bottom:26px}.btns{display:flex;gap:14px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:15px 22px;font-weight:900;cursor:pointer;box-shadow:0 14px 32px rgba(37,99,235,.18)}.primary{background:#2563eb;color:white}.secondary{background:white;color:#172033;border:1px solid #dfe6f3}.chips{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}.chip{background:white;border:1px solid #e6ebf5;border-radius:999px;padding:10px 14px;font-weight:800;color:#445169}.phone{position:relative;background:linear-gradient(160deg,#ffffff,#eef4ff);border:1px solid #dfe7f7;border-radius:34px;padding:24px;box-shadow:0 30px 80px rgba(31,41,55,.18)}.float{position:absolute;background:#fff;border:1px solid #e7ecf6;border-radius:18px;padding:12px 16px;font-weight:900;box-shadow:0 18px 35px rgba(0,0,0,.12)}.f1{top:22px;right:-8px}.f2{bottom:22px;left:-12px}.cardpick{margin-top:46px;background:#fff;border-radius:28px;padding:24px;border:1px solid #e7ecf6}.product-img{height:155px;border-radius:22px;background:linear-gradient(135deg,#dbeafe,#fae8ff);display:grid;place-items:center;font-size:58px;margin-bottom:18px}.row{display:flex;justify-content:space-between;align-items:center}.rating{color:#f59e0b;font-weight:900}.price{font-size:28px;font-weight:900;color:#2563eb}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:40px}.stat{background:white;border:1px solid #e8ecf5;border-radius:22px;padding:22px;text-align:center}.stat b{display:block;font-size:28px;color:#2563eb}.section{padding:68px 0}.label{text-align:center;color:#2563eb;font-weight:900;text-transform:uppercase;letter-spacing:.12em}.title{text-align:center;font-size:clamp(32px,4vw,48px);line-height:1.05;margin:10px auto 12px}.sub{text-align:center;color:#667085;font-size:18px;max-width:720px;margin:0 auto 36px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px}.cat,.product,.trust{background:#fff;border:1px solid #e8ecf5;border-radius:26px;padding:24px;transition:.25s}.cat:hover,.product:hover{transform:translateY(-6px);box-shadow:0 24px 45px rgba(31,41,55,.12)}.ico{width:58px;height:58px;border-radius:18px;background:#eef4ff;display:grid;place-items:center;font-size:30px;margin-bottom:16px}.cat h3,.trust h3{font-size:21px;margin-bottom:8px}.cat p,.trust p,.product p{color:#667085}.browse{margin-top:18px;display:inline-block;color:#2563eb;font-weight:900}.products{grid-template-columns:repeat(3,1fr)}.product .product-img{height:180px}.tag{display:inline-block;background:#ecfdf5;color:#047857;padding:6px 10px;border-radius:999px;font-weight:900;font-size:13px}.deal-tabs{text-align:center;margin-bottom:24px}.deal-tabs span{display:inline-block;background:#fff;border:1px solid #e5eaf3;border-radius:999px;padding:10px 16px;margin:5px;font-weight:900}.trust-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.brands{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:22px}.brandbox{background:#fff;border:1px dashed #cfd8ea;border-radius:18px;padding:16px 28px;font-weight:900}.disclosure{background:#fff7ed;border:1px solid #fed7aa;border-radius:18px;padding:16px;text-align:center;margin-top:24px;color:#9a3412;font-weight:700}.footer{background:#101827;color:#d7deea;padding:50px 0 22px}.footgrid{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:30px}.footer h3,.footer h4{color:white;margin-bottom:12px}.footer li{list-style:none;margin:8px 0}.copy{text-align:center;border-top:1px solid #263245;margin-top:34px;padding-top:22px;color:#9aa7bd}.admin-panel{display:none;position:fixed;inset:0;background:rgba(8,13,26,.76);z-index:99;padding:30px;overflow:auto}.admin-box{max-width:760px;margin:auto;background:#fff;border-radius:26px;padding:24px}.admin-box input,.admin-box textarea,.admin-box select{width:100%;padding:13px;border:1px solid #d8deeb;border-radius:14px;margin:8px 0 14px}.close{float:right;background:#ef4444;color:#fff;border:0;border-radius:12px;padding:8px 14px;cursor:pointer}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:900px){.hero-grid,.footgrid{grid-template-columns:1fr}.grid,.products,.trust-grid,.stats{grid-template-columns:1fr 1fr}.links{display:none}.phone{margin-top:20px}}@media(max-width:560px){.grid,.products,.trust-grid,.stats,.formgrid{grid-template-columns:1fr}.hero{padding-top:42px}.btn{width:100%}.hero h1{letter-spacing:-1px}}
  
.login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(430px,94%);background:#fff;border:1px solid #e8ecf5;border-radius:28px;padding:30px;box-shadow:0 30px 80px rgba(31,41,55,.15)}.login-card input{width:100%;padding:14px;border:1px solid #d8deeb;border-radius:14px;margin:10px 0 14px}.error{color:#dc2626;font-weight:800;min-height:24px}.topbar{background:#101827;color:white;padding:18px 0}.dash{padding:34px 0}.table{background:white;border:1px solid #e8ecf5;border-radius:20px;overflow:hidden}.item{display:grid;grid-template-columns:80px 1fr 120px 90px;gap:12px;padding:14px;border-bottom:1px solid #eef2f7;align-items:center}.actions button{border:0;border-radius:10px;padding:8px 10px;cursor:pointer}.danger{background:#ef4444;color:white}.thumb{width:62px;height:62px;border-radius:14px;background:#eef4ff;display:grid;place-items:center;font-size:28px;overflow:hidden}.thumb img{width:100%;height:100%;object-fit:cover}</style></head><body><script>if(sessionStorage.getItem('adminLogin')!=='yes') location.href='admin-login.html';</script><div class="topbar"><div class="wrap row"><b>Apex Shopping Admin</b><div><a href="index.html" style="margin-right:16px">View Website</a><button class="btn secondary" onclick="logout()">Logout</button></div></div></div><main class="wrap dash"><h1>Admin Panel</h1><p style="color:#667085;margin-bottom:20px">Yahan se product add/delete kar sakte ho. Products browser localStorage me save honge.</p><div class="admin-box" style="max-width:100%;margin-bottom:24px"><h2>Add Product</h2><div class="formgrid"><input id="pname" placeholder="Product name"><input id="price" placeholder="Price e.g. ₹699"><select id="cat"><option>Health & Fitness</option><option>Pet Care</option><option>Healthcare</option><option>Skincare</option><option>Haircare</option></select><input id="emoji" placeholder="Emoji fallback e.g. 💊"><input id="img" placeholder="Product image URL e.g. https://..."></div><textarea id="desc" placeholder="Short description"></textarea><input id="link" placeholder="Affiliate link"><button class="btn primary" onclick="addProduct()">Add Product</button></div><h2>Products</h2><div class="table" id="list"></div></main><script>const sample=[{n:'Vitamin D3 + K2',c:'Healthcare',p:'₹699',e:'💊',img:'https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?auto=format&fit=crop&w=600&q=80',d:'Daily wellness supplement with high customer rating.',l:'#'},{n:'Organic Pet Shampoo',c:'Pet Care',p:'₹349',e:'🐕',img:'https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=600&q=80',d:'Gentle grooming choice for healthy pet coat.',l:'#'},{n:'Vitamin C Serum',c:'Skincare',p:'₹599',e:'✨',img:'https://images.unsplash.com/photo-1620916566398-39f1143ab7be?auto=format&fit=crop&w=600&q=80',d:'Brightening skincare pick for daily routine.',l:'#'}];const getProducts=()=>JSON.parse(localStorage.getItem('products')||'null')||sample;function save(p){localStorage.setItem('products',JSON.stringify(p));render()}function media(p){return p.img?`<img src="${p.img}" alt="${p.n}" onerror="this.parentElement.textContent='${p.e||'🛍️'}'">`:(p.e||'🛍️')}function render(){list.innerHTML=getProducts().map((p,i)=>`<div class="item"><div class="thumb">${media(p)}</div><div><b>${p.n}</b><br><small>${p.c} • ${p.d}</small><br><small>Image: ${p.img||'No image URL'}</small></div><b>${p.p}</b><div class="actions"><button class="danger" onclick="delP(${i})">Delete</button></div></div>`).join('')}function addProduct(){let products=getProducts();products.unshift({n:pname.value||'New Product',p:price.value||'₹999',c:cat.value,e:emoji.value||'🛍️',img:img.value||'',d:desc.value||'Recommended product.',l:link.value||'#'});save(products);pname.value=price.value=emoji.value=img.value=desc.value=link.value=''}function delP(i){let p=getProducts();p.splice(i,1);save(p)}function logout(){sessionStorage.removeItem('adminLogin');location.href='admin-login.html'}render();</script></body></html>
